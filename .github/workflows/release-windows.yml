name: release-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate tag and package version
        run: node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));const tag=(process.env.GITHUB_REF_NAME||'').replace(/^v/,'');if(!tag){console.error('Missing tag');process.exit(1)}if(pkg.version!==tag){console.error(`Tag version (${tag}) and package.json version (${pkg.version}) must match.`);process.exit(1)}"

      - name: Build and publish Windows packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: pnpm generate && pnpm build && electron-builder --win --${{ matrix.arch }} --config electron-builder.json --publish always

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-dist
          path: |
            dist/*.exe
            dist/*.7z
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
