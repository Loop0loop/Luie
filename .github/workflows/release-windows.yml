name: release-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync package version from tag
        id: release_meta
        run: node scripts/ci/sync-release-version-from-tag.mjs

      - name: Build Windows nsis-web package
        run: bun run generate && bun run build && bunx electron-builder --win nsis-web --${{ matrix.arch }} --config electron-builder.json --publish never

      - name: Upload Windows assets to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes \
            || gh release view "$RELEASE_TAG" >/dev/null

          shopt -s nullglob
          assets=(dist/*.exe dist/*.7z dist/*.yml dist/*.blockmap)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No Windows release assets found in dist"
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-dist
          path: |
            dist/*.exe
            dist/*.7z
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
