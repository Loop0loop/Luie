name: release-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync package version from tag
        id: release_meta
        run: node scripts/ci/sync-release-version-from-tag.mjs

      - name: Build and publish Windows packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun run generate && bun run build && bun exec electron-builder --win --${{ matrix.arch }} --config electron-builder.json --publish always

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-dist
          path: |
            dist/*.exe
            dist/*.7z
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
