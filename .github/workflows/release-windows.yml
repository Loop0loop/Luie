name: release-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Windows packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: pnpm run build:win:${{ matrix.arch }} -- --publish always

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-dist
          path: |
            dist/*.exe
            dist/*.7z
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
