name: release-macos

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-sign-notarize:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync package version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/ci/sync-release-version-from-tag.mjs

      - name: Setup Apple signing credentials
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          : "${APPLE_APP_SPECIFIC_PASSWORD:?Missing APPLE_APP_SPECIFIC_PASSWORD secret}"
          : "${APPLE_ID:?Missing APPLE_ID secret}"
          : "${APPLE_TEAM_ID:?Missing APPLE_TEAM_ID secret}"
          : "${MACOS_CERTIFICATE_BASE64:?Missing MACOS_CERTIFICATE_BASE64 secret}"
          : "${MACOS_CERTIFICATE_PASSWORD:?Missing MACOS_CERTIFICATE_PASSWORD secret}"

          KEYCHAIN_PATH="$RUNNER_TEMP/luie-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          NOTARY_PROFILE="luie-notary"

          printf "%s" "$MACOS_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --keychain "$KEYCHAIN_PATH"

          {
            echo "CSC_KEYCHAIN=$KEYCHAIN_PATH"
            echo "LUIE_NOTARY_KEYCHAIN=$KEYCHAIN_PATH"
            echo "LUIE_NOTARY_KEYCHAIN_PROFILE=$NOTARY_PROFILE"
          } >> "$GITHUB_ENV"

          rm -f "$CERTIFICATE_PATH"

      - name: Build, sign, and notarize macOS app
        run: bun run build:mac:arm64

      - name: Validate stapled app
        run: |
          set -euo pipefail
          xcrun stapler validate dist/mac-arm64/Luie.app
          spctl --assess --type execute --verbose=4 dist/mac-arm64/Luie.app

      - name: Upload macOS release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/release-mac.mjs

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-dist
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
          if-no-files-found: warn

      - name: Delete temporary signing keychain
        if: always()
        run: |
          if [ -n "${CSC_KEYCHAIN:-}" ]; then
            security delete-keychain "$CSC_KEYCHAIN" || true
          fi
